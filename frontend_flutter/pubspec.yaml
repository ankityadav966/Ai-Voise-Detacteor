name: peter_laka
description: "Patera Laka - Premium AI voice recorder and meeting transcription assistant."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Routing & State Management
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.1

  # Local Caching & DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio & Speech
  record: ^5.1.2
  speech_to_text: ^6.6.2
  just_audio: ^0.9.38

  # Networking
  dio: ^5.4.3+1
  http: ^1.2.1

  # Device & Platforms
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3

  # Document Generation & Sharing
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^9.0.0
  file_picker: ^8.0.3

  # Aesthetics & Visuals
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  google_fonts: ^6.2.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
