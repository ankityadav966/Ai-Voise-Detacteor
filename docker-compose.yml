version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: peter_laka_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: peter_laka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - peter_laka_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: peter_laka_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@peterlaka.ai
      PGADMIN_DEFAULT_PASSWORD: admin_secure_pass
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - peter_laka_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peter_laka_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@postgres:5432/peter_laka?schema=public
      - JWT_SECRET=super_secret_session_jwt_token_peter_laka_key
      - JWT_REFRESH_SECRET=super_secret_refresh_jwt_token_peter_laka_key
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - peter_laka_network

volumes:
  postgres_data:

networks:
  peter_laka_network:
    driver: bridge
